<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trial Balance - Khoium's Accounting</title>
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Flatpickr Calendar CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    
    <!-- custom css file link -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/accounting.css">
    <link rel="stylesheet" href="css/reports.css">

    <style>
        /* Calendar customization */
        .flatpickr-calendar {
            font-family: "Montserrat", sans-serif;
            border-radius: 0.5rem;
            box-shadow: var(--box-shadow);
            border: var(--border);
        }
        
        .flatpickr-day.selected {
            background: var(--main-color);
            border-color: var(--main-color);
        }
        
        .flatpickr-day.selected:hover {
            background: var(--secondary-color);
        }
        
        .flatpickr-months .flatpickr-month {
            background: var(--main-color);
        }
        
        .flatpickr-current-month .flatpickr-monthDropdown-months {
            background: var(--main-color);
            color: white;
        }
        
        .flatpickr-weekdays {
            background: var(--bg-color);
        }
        
        .flatpickr-day.today {
            border-color: var(--main-color);
        }
        
        .flatpickr-day.today:hover {
            background: var(--main-color);
            color: white;
        }
        
        .flatpickr-prev-month, .flatpickr-next-month {
            color: white !important;
        }
        
        .flatpickr-prev-month:hover, .flatpickr-next-month:hover {
            color: var(--secondary-color) !important;
        }
        
        .date-picker {
            background: white;
            cursor: pointer;
        }
        
        .date-picker:hover {
            border-color: var(--main-color);
        }
        
        /* Trial balance specific styles */
        .report-controls .date-range {
            display: flex;
            align-items: flex-end;
            gap: 2rem;
        }
        
        .report-controls .date-range .form-group {
            min-width: 200px;
        }
        
        @media (max-width: 768px) {
            .report-controls .date-range {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            
            .report-controls .date-range .form-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- header section starts -->
    <header class="header">
        <section class="flex">
            <a href="index.html" class="logo"> <i class="fas fa-calculator"></i> Khoium's Accounting</a>

            <nav class="navbar">
                <ul>
                    <li><a href="index.html">home</a></li>
                    <li><a href="about.html">about</a></li>
                    <li><a href="index.html#payment">accounting</a></li>
                    <li><a href="#">reports <i class="fas fa-angle-down"></i></a>
                        <ul>
                            <li><a href="ledger.html">ledger</a></li>
                            <li><a href="trial-balance.html" class="active">trial balance</a></li>
                            <li><a href="profit-loss.html">profit & loss</a></li>
                            <li><a href="balance-sheet.html">balance sheet</a></li>
                        </ul>
                    </li>
                    <li><a href="contact.html">contact</a></li>
                </ul>
            </nav>

            <div id="menu-btn" class="fas fa-bars-staggered"></div>

        </section>
    </header>
    <!-- header section ends -->

    <!-- main content starts -->
    <main>
        <section class="report-section">
            <h1 class="heading">trial <span>balance</span></h1>
            
            <div class="report-controls">
                <div class="date-range">
                    <div class="form-group">
                        <label for="as-of-date"><i class="fas fa-calendar-alt"></i> As of Date:</label>
                        <input type="text" id="as-of-date" class="date-picker" placeholder="Select date" readonly>
                    </div>
                    <button class="btn" onclick="loadTrialBalance()"><i class="fas fa-search"></i> Load Report</button>
                </div>
                <div class="report-actions">
                    <button class="btn" onclick="printReport()"><i class="fas fa-print"></i> Print</button>
                    <button class="btn" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
                    <button class="btn" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Export Excel</button>
                </div>
            </div>

            <div id="report-content" class="report-content">
                <div class="loading">Select a date to view trial balance</div>
            </div>
        </section>
    </main>
    <!-- main content ends -->

    <!-- footer section starts -->
    <footer class="footer">
        <section>
            <div class="share">
                <a href="#" class="fab fa-facebook-f"></a>
                <a href="#" class="fab fa-twitter"></a>
                <a href="#" class="fab fa-linkedin"></a>
                <a href="#" class="fab fa-instagram"></a>
                <a href="#" class="fab fa-youtube"></a>
            </div>
            <div class="credit">&copy; 2026 Khoium's Accounting. All rights reserved.</div>
        </section>
    </footer>
    <!-- footer section ends -->

    <!-- Flatpickr Calendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <!-- custom js file link -->
    <script src="js/script.js"></script>
    <script src="js/accounting.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/reports.js"></script>
    

    <script>
        // Initialize date picker with enhanced options
        document.addEventListener('DOMContentLoaded', function() {
            // As of date picker
            flatpickr("#as-of-date", {
                dateFormat: "Y-m-d",
                defaultDate: "today",
                allowInput: true,
                altInput: true,
                altFormat: "F j, Y",
                theme: "material_blue",
                maxDate: "today",
                onChange: function(selectedDates, dateStr, instance) {
                    console.log('Selected date:', dateStr);
                }
            });

            // Auto-load report if date is pre-selected
            const asOfDate = document.getElementById('as-of-date');
            if (asOfDate && asOfDate.value && typeof loadTrialBalance === 'function') {
                // Optional: Auto-load on page load if you want
                // loadTrialBalance();
            }
        });
    </script>
    <script>
    // Safety checks for all pages
    document.addEventListener('DOMContentLoaded', function() {
        // Ensure transactions array exists
        if (typeof transactions === 'undefined') {
            window.transactions = [];
        }
        
        // Ensure ledgers array exists
        if (typeof ledgers === 'undefined') {
            window.ledgers = [];
        }
        
        // Ensure banks array exists
        if (typeof banks === 'undefined') {
            window.banks = [];
        }
        
        // Ensure customSubGroups array exists
        if (typeof customSubGroups === 'undefined') {
            window.customSubGroups = [];
        }
        
        console.log('Safety checks completed');
    });
</script>
</body>
</html>
